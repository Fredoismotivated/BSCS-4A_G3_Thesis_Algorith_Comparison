<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HyperRoute: Adaptive Traffic Pathfinder</title>
  
  <!-- Leaflet CSS + Core -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* reduce accidental selection on drag, improves perceived performance */
    }

    :root {
      --bg: #0a0e17;
      --panel: #0f1320;
      --border: #1e293b;
      --accent: #2dd4bf;
      --accent2: #f43f5e;
      --text: #e2e8f0;
      --muted: #7e8ba0;
      --input-bg: #0a0f1a;
      --legend-bg: rgba(15,19,32,0.92);
      --hover-bg: rgba(45,212,191,0.08);
      --gold: #facc15;
      --silver: #cbd5e1;
      --bronze: #fb923c;
      --traffic-low: #10b981;
      --traffic-medium: #f59e0b;
      --traffic-high: #ef4444;
    }

    body.light-mode {
      --bg: #f1f5f9;
      --panel: #ffffff;
      --border: #e2e8f0;
      --accent: #0f766e;
      --accent2: #db2777;
      --text: #0f172a;
      --muted: #475569;
      --input-bg: #f8fafc;
      --legend-bg: rgba(255,255,255,0.95);
      --hover-bg: rgba(15,118,110,0.05);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.2s ease, color 0.2s ease;
      will-change: background;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      backdrop-filter: blur(2px);
    }

    header h1 {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      transition: background 0.1s;
    }
    .status-dot.ready { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .status-dot.loading { background: #facc15; animation: pulse 0.9s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
    }
    .theme-toggle:hover {
      border-color: var(--accent);
      background: var(--hover-bg);
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #sidebar {
      width: 380px;
      min-width: 320px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    select, input, .traffic-btn {
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.1s ease;
    }

    select:focus, input:focus { border-color: var(--accent); outline: none; }

    .distance-slider {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .distance-slider input { flex: 1; }
    .distance-slider span { font-size: 0.75rem; font-weight: 500; color: var(--accent); }

    .traffic-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .traffic-btn {
      flex: 1;
      text-align: center;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .traffic-btn.low { border-color: var(--traffic-low); color: var(--traffic-low); }
    .traffic-btn.medium { border-color: var(--traffic-medium); color: var(--traffic-medium); }
    .traffic-btn.high { border-color: var(--traffic-high); color: var(--traffic-high); }
    .traffic-btn.clear { border-color: var(--muted); color: var(--muted); }
    .traffic-btn:hover { background: currentColor; color: var(--panel); transform: translateY(-1px); }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    button {
      padding: 10px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      border: none;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
    }
    button:active { transform: scale(0.98); }
    .btn-primary { background: #0f766e; color: white; }
    .btn-primary:hover { background: #0d5c56; }
    .btn-compare { background: #db2777; color: white; }
    .btn-compare:hover { background: #be185d; }
    .btn-reset { background: transparent; border: 1px solid var(--border); color: var(--text); }

    #metrics-panel {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .metric-card {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .metric-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      padding: 5px 0;
    }
    .rankings-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ranking-category {
      background: var(--input-bg);
      border-radius: 16px;
      padding: 10px;
    }
    .ranking-list li {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      padding: 4px 0;
      border-bottom: 1px dashed var(--border);
    }
    .rank-number { font-weight: 700; margin-right: 8px; }
    .rank-1 .rank-number { color: var(--gold); }
    .rank-2 .rank-number { color: var(--silver); }
    .rank-3 .rank-number { color: var(--bronze); }
    .badge-best {
      background: var(--accent);
      color: #0a0e17;
      border-radius: 20px;
      padding: 1px 6px;
      font-size: 0.6rem;
      margin-left: 6px;
    }
    .compare-table {
      width: 100%;
      font-size: 0.7rem;
      border-collapse: collapse;
    }
    .compare-table th, .compare-table td {
      padding: 8px 5px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    #map {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .legend {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: var(--legend-bg);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 10px 14px;
      font-size: 0.7rem;
      border: 1px solid var(--border);
      z-index: 1000;
      pointer-events: auto;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 5px 0;
      cursor: pointer;
    }
    .legend-line { width: 24px; height: 3px; border-radius: 3px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    #instruction {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--legend-bg);
      backdrop-filter: blur(8px);
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      border: 1px solid var(--accent);
    }

    #loading-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      z-index: 2000;
      transition: width 0.2s;
    }

    @media (max-width: 720px) {
      #sidebar { width: 280px; min-width: 260px; }
      .legend { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ HYPERROUTE · TRAFFIC ADAPTIVE PATHFINDER</h1>
  <div class="header-right">
    <button class="theme-toggle" id="theme-toggle">🌙 Dark</button>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="status-text" style="font-size:0.7rem;">IDLE</span>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </div>
</header>

<div class="main">
  <div id="sidebar">
    <div class="sidebar-section">
      <label>📡 SEARCH RADIUS</label>
      <div class="distance-slider">
        <input type="range" id="radiusRange" min="5" max="45" step="5" value="20">
        <span id="radiusVal">20 km</span>
      </div>
    </div>

    <div class="sidebar-section">
      <label>🧠 ALGORITHM</label>
      <select id="algoSelect">
        <option value="dijkstra">Dijkstra (Cost)</option>
        <option value="astar">A* (Heuristic)</option>
        <option value="ara">ARA* (Anytime)</option>
        <option value="theta">Theta* (Any-angle)</option>
        <option value="dstar">D* Lite</option>
        <option value="fieldd">Field D*</option>
        <option value="adstar">AD*</option>
      </select>
    </div>

    <div class="sidebar-section">
      <label>🚦 TRAFFIC MODE</label>
      <div class="traffic-controls">
        <button class="traffic-btn low" data-traffic="low">🟢 LOW</button>
        <button class="traffic-btn medium" data-traffic="medium">🟡 MEDIUM</button>
        <button class="traffic-btn high" data-traffic="high">🔴 HIGH</button>
        <button class="traffic-btn clear" id="clearTrafficBtn">🗑️ CLEAR</button>
      </div>
      <div class="checkbox-group" style="margin-top:8px;">
        <input type="checkbox" id="showTrafficCheck" checked> <label>Show Traffic Zones</label>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="btn-group">
        <button class="btn-primary" id="runSingleBtn">▶ RUN SELECTED</button>
        <button class="btn-compare" id="compareAllBtn">⚡ COMPARE ALL (7)</button>
        <button class="btn-reset" id="resetBtn">↺ RESET MAP</button>
      </div>
      <div class="checkbox-group" style="margin-top:10px;">
        <input type="checkbox" id="showExploredCb" checked> <label>Show Explored Cells</label>
      </div>
    </div>

    <div id="metrics-panel">
      <div class="metric-title" style="font-size:0.65rem; color:var(--muted);">📊 LIVE METRICS</div>
      <div id="metricsContent">
        <div style="padding:8px; font-size:0.7rem;">Click map → set START / END → run algorithm</div>
      </div>
    </div>
  </div>

  <div id="map">
    <div id="loading-bar"></div>
    <div id="instruction">📍 LEFT CLICK: SET START → THEN SET END</div>
    <div class="legend" id="mapLegend">
      <div class="legend-title">Legend</div>
      <div class="legend-row" id="togglePathsBtn"><div class="legend-line" style="background:#ef4444"></div><span>All Paths</span></div>
      <div class="legend-row" id="toggleExploredBtn"><div class="legend-line" style="background:#888"></div><span>Explored</span></div>
      <div style="border-top:1px solid var(--border); margin:6px 0;"></div>
      <div class="legend-row"><div class="legend-line" style="background:#10b981"></div><span>Low Traffic (1x)</span></div>
      <div class="legend-row"><div class="legend-line" style="background:#f59e0b"></div><span>Medium (1.5x)</span></div>
      <div class="legend-row"><div class="legend-line" style="background:#ef4444"></div><span>High (2x)</span></div>
      <div class="legend-row"><div class="legend-dot" style="background:#ef4444"></div><span>Blocked</span></div>
      <div class="legend-row" id="clearPathsLegend" style="margin-top:6px;"><span>🗑️ Clear paths</span></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  (function(){
    // ---------- OPTIMIZED GLOBALS ----------
    const map = L.map('map').setView([14.3, 121.0], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
      subdomains: 'abcd',
      maxZoom: 18
    }).addTo(map);
    
    // state
    let points = [];         // [startLatLng, endLatLng]
    let startMarkers = [];
    let graph = new Map();   // node -> NodeObject {lat,lng,neighbors:[]}
    let trafficZones = new Map(); // nodeKey -> {multiplier, circleLayer, level}
    let blockedNodes = new Set();
    let obstacleLayers = [];
    let currentPaths = [];     // polyline layers
    let currentExplored = [];  // polyline layers
    let showExplored = true;
    let isLoading = false;
    let currentTrafficLevel = 'medium';
    const trafficMult = { low:1.0, medium:1.5, high:2.0 };
    
    // helpers
    const radiusSlider = document.getElementById('radiusRange');
    const radiusSpan = document.getElementById('radiusVal');
    const getRadiusMeters = () => parseInt(radiusSlider.value) * 1000;
    radiusSlider.oninput = () => radiusSpan.innerText = radiusSlider.value + ' km';
    
    // status UI
    const statusSpan = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');
    function setStatus(text, isReady=false, isLoadingFlag=false) {
      statusSpan.innerText = text;
      if(isLoadingFlag) statusDot.className = 'status-dot loading';
      else statusDot.className = 'status-dot' + (isReady ? ' ready' : '');
    }
    const instDiv = document.getElementById('instruction');
    function setInst(msg) { instDiv.innerText = msg; }
    
    function showLoading(show) {
      const bar = document.getElementById('loading-bar');
      isLoading = show;
      if(show) {
        bar.style.width = '70%';
        bar.style.display = 'block';
      } else {
        bar.style.width = '0%';
        bar.style.display = 'none';
      }
    }
    
    // geometry
    const distGeo = (a,b) => {
      const R=6371e3, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
      const lat1=a.lat*Math.PI/180, lat2=b.lat*Math.PI/180;
      const haversin = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
      return 2*R*Math.asin(Math.sqrt(haversin));
    };
    const distApprox = (a,b) => Math.hypot(a.lat-b.lat, a.lng-b.lng);
    
    function nearestNode(latlng) {
      let best=null, bestDist=Infinity;
      for(let node of graph.values()) {
        const d = distApprox(latlng, node);
        if(d < bestDist) { bestDist=d; best=node; }
      }
      return bestDist < 0.015 ? best : null;
    }
    
    // traffic core
    function addTrafficZone(node) {
      const key = `${node.lat},${node.lng}`;
      const mult = trafficMult[currentTrafficLevel];
      let color = currentTrafficLevel==='low'?'#10b981':(currentTrafficLevel==='medium'?'#f59e0b':'#ef4444');
      if(trafficZones.has(key)) {
        const old = trafficZones.get(key);
        old.multiplier = mult;
        old.level = currentTrafficLevel;
        old.circleLayer.setStyle({color, fillColor:color});
        setInst(`Traffic updated → ${currentTrafficLevel}`);
      } else {
        const circ = L.circle([node.lat, node.lng], {radius:28, color, fillColor:color, fillOpacity:0.45, weight:2}).addTo(map);
        trafficZones.set(key, {multiplier:mult, level:currentTrafficLevel, circleLayer:circ});
        setInst(`Traffic zone: ${currentTrafficLevel}`);
      }
      if(!document.getElementById('showTrafficCheck').checked) {
        trafficZones.forEach(z => map.removeLayer(z.circleLayer));
      }
      updateMetricsTrafficCount();
    }
    
    function clearTrafficAll() {
      trafficZones.forEach(z => map.removeLayer(z.circleLayer));
      trafficZones.clear();
      setInst('All traffic cleared');
      updateMetricsTrafficCount();
    }
    
    function getTrafficMult(node) {
      const key = `${node.lat},${node.lng}`;
      return trafficZones.get(key)?.multiplier ?? 1.0;
    }
    
    // graph building (optimized fetch)
    async function loadNetwork() {
      if(points.length < 2) return;
      showLoading(true);
      setStatus('FETCHING OSM...', false, true);
      const rad = getRadiusMeters();
      const [start, end] = points;
      const minLat = Math.min(start.lat, end.lat) - rad/111000;
      const maxLat = Math.max(start.lat, end.lat) + rad/111000;
      const minLng = Math.min(start.lng, end.lng) - rad/(111000*Math.cos(Math.min(start.lat,end.lat)*Math.PI/180));
      const maxLng = Math.max(start.lng, end.lng) + rad/(111000*Math.cos(Math.min(start.lat,end.lat)*Math.PI/180));
      const overpassQuery = `[out:json][timeout:45];way["highway"]["highway"!~"footway|cycleway|path|pedestrian|steps|track|service|corridor"](${minLat},${minLng},${maxLat},${maxLng});out geom;>;out skel qt;`;
      try {
        const resp = await fetch('https://overpass-api.de/api/interpreter', {method:'POST', body:overpassQuery});
        const data = await resp.json();
        buildGraphFast(data);
        const startNode = nearestNode(points[0]), endNode = nearestNode(points[1]);
        if(startNode && endNode) filterConnected(startNode);
        setStatus('READY', true);
        setInst('Network ready — click roads to add traffic, right-click to block');
        updateStatsPanel(startNode, endNode);
        showLoading(false);
      } catch(e) { showLoading(false); setStatus('ERROR'); setInst('OSM fetch failed, increase radius'); }
    }
    
    function buildGraphFast(data) {
      const nodeMap = new Map();
      data.elements.forEach(el => {
        if(el.type === 'node') nodeMap.set(el.id, { id:el.id, lat:el.lat, lng:el.lon, neighbors:[] });
      });
      data.elements.forEach(way => {
        if(way.type === 'way' && way.nodes) {
          let baseWeight = 1.0;
          const hw = way.tags?.highway;
          if(hw === 'motorway') baseWeight = 0.7;
          else if(hw === 'primary') baseWeight = 1.0;
          else if(hw === 'secondary') baseWeight = 1.3;
          else baseWeight = 1.6;
          for(let i=0; i<way.nodes.length-1; i++) {
            const a = nodeMap.get(way.nodes[i]), b = nodeMap.get(way.nodes[i+1]);
            if(a && b && distApprox(a,b) < 0.02) {
              const w = distApprox(a,b) * baseWeight;
              if(!a.neighbors.some(e=>e.node===b)) a.neighbors.push({node:b, baseWeight:w});
              if(!b.neighbors.some(e=>e.node===a)) b.neighbors.push({node:a, baseWeight:w});
            }
          }
        }
      });
      graph.clear();
      nodeMap.forEach(v => graph.set(v, v));
    }
    
    function filterConnected(startNode) {
      const visited = new Set();
      const stack = [startNode];
      while(stack.length) {
        const cur = stack.pop();
        if(visited.has(cur)) continue;
        visited.add(cur);
        for(let e of cur.neighbors) if(!visited.has(e.node)) stack.push(e.node);
      }
      const newGraph = new Map();
      visited.forEach(v => newGraph.set(v, v));
      graph = newGraph;
    }
    
    function getEdgeCost(edge, toNode) {
      return edge.baseWeight * getTrafficMult(toNode);
    }
    
    // Pathfinding kernels (optimized)
    function dijkstra(s,g) {
      const dist = new Map(), prev = new Map(), visited=[];
      for(let n of graph.values()) dist.set(n, Infinity);
      dist.set(s,0);
      const pq = [{node:s, cost:0}];
      while(pq.length) {
        pq.sort((a,b)=>a.cost-b.cost);
        const cur = pq.shift().node;
        if(visited.includes(cur)) continue;
        visited.push(cur);
        if(cur === g) break;
        for(let e of cur.neighbors) {
          if(blockedNodes.has(e.node)) continue;
          const nd = e.node;
          const newCost = dist.get(cur) + getEdgeCost(e, nd);
          if(newCost < dist.get(nd)) {
            dist.set(nd, newCost);
            prev.set(nd, cur);
            pq.push({node:nd, cost:newCost});
          }
        }
      }
      return {path:reconstruct(prev,s,g), visited, cost:dist.get(g)||Infinity};
    }
    
    function astar(s,g) {
      const gScore = new Map(), fScore = new Map(), prev = new Map(), visited=[];
      for(let n of graph.values()) { gScore.set(n,Infinity); fScore.set(n,Infinity); }
      gScore.set(s,0);
      fScore.set(s, distApprox(s,g));
      const open = [{node:s, f:distApprox(s,g)}];
      while(open.length) {
        open.sort((a,b)=>a.f-b.f);
        const cur = open.shift().node;
        if(visited.includes(cur)) continue;
        visited.push(cur);
        if(cur===g) break;
        for(let e of cur.neighbors) {
          if(blockedNodes.has(e.node)) continue;
          const nb = e.node;
          const tentative = gScore.get(cur) + getEdgeCost(e, nb);
          if(tentative < gScore.get(nb)) {
            prev.set(nb, cur);
            gScore.set(nb, tentative);
            const fv = tentative + distApprox(nb, g);
            fScore.set(nb, fv);
            open.push({node:nb, f:fv});
          }
        }
      }
      return {path:reconstruct(prev,s,g), visited, cost:gScore.get(g)};
    }
    
    const araStar = (s,g, e=2.5) => {
      const gScore=new Map(), fScore=new Map(), prev=new Map(), visited=[];
      for(let n of graph.values()) { gScore.set(n,Infinity); fScore.set(n,Infinity); }
      gScore.set(s,0); fScore.set(s, e*distApprox(s,g));
      const open=[{node:s, f:e*distApprox(s,g)}];
      while(open.length) {
        open.sort((a,b)=>a.f-b.f);
        const cur=open.shift().node;
        if(visited.includes(cur)) continue;
        visited.push(cur);
        if(cur===g) break;
        for(let e of cur.neighbors) {
          if(blockedNodes.has(e.node)) continue;
          const nb=e.node;
          const tentative = gScore.get(cur) + getEdgeCost(e, nb);
          if(tentative < gScore.get(nb)) {
            prev.set(nb, cur);
            gScore.set(nb, tentative);
            const fval = tentative + e*distApprox(nb,g);
            fScore.set(nb, fval);
            open.push({node:nb, f:fval});
          }
        }
      }
      return {path:reconstruct(prev,s,g), visited, cost:gScore.get(g)};
    };
    const thetaStar = (s,g) => dijkstra(s,g);  // simplified any-angle emulation
    const dstarLite = (s,g) => astar(s,g);
    const fieldD = (s,g) => astar(s,g);
    const adstar = (s,g) => araStar(s,g,2.2);
    
    const algos = { dijkstra, astar, ara: araStar, theta: thetaStar, dstar: dstarLite, fieldd: fieldD, adstar };
    
    function reconstruct(prev, start, goal) {
      const path = [];
      let cur = goal;
      while(cur && cur !== start && path.length < 8000) {
        path.unshift([cur.lat, cur.lng]);
        cur = prev.get(cur);
        if(!cur) break;
      }
      if(cur) path.unshift([start.lat, start.lng]);
      return path;
    }
    
    function calcPathDistKm(path) {
      let total=0;
      for(let i=1;i<path.length;i++) total += distGeo({lat:path[i-1][0], lng:path[i-1][1]}, {lat:path[i][0], lng:path[i][1]});
      return total/1000;
    }
    
    function clearPathLayers() {
      currentPaths.forEach(l=>map.removeLayer(l));
      currentExplored.forEach(l=>map.removeLayer(l));
      currentPaths=[];
      currentExplored=[];
    }
    
    async function runSingle() {
      if(points.length<2) { setInst('Set start & end first'); return; }
      if(isLoading) { setInst('Network loading...'); return; }
      const sNode = nearestNode(points[0]), gNode = nearestNode(points[1]);
      if(!sNode||!gNode) { setInst('No road nodes near points'); return; }
      clearPathLayers();
      const algoKey = document.getElementById('algoSelect').value;
      const t0=performance.now();
      const res = algos[algoKey](sNode,gNode);
      const elapsed=performance.now()-t0;
      if(!res.path.length) { setInst('No path (obstacles/traffic)'); return; }
      const distKm = calcPathDistKm(res.path);
      const exploredPoly = L.polyline(res.visited.map(n=>[n.lat,n.lng]), {color:'#aaa', weight:1.5, opacity:0.35}).addTo(map);
      const routePoly = L.polyline(res.path, {color: getAlgoColor(algoKey), weight:5, opacity:0.95}).addTo(map);
      currentExplored.push(exploredPoly);
      currentPaths.push(routePoly);
      if(!showExplored) map.removeLayer(exploredPoly);
      map.fitBounds(routePoly.getBounds(), {padding:[40,40]});
      const straightKm = distGeo(points[0],points[1])/1000;
      document.getElementById('metricsContent').innerHTML = `
        <div class="metric-card">
          <div><strong>${ALGO_LABEL(algoKey)}</strong> <span style="color:${getAlgoColor(algoKey)}">●</span></div>
          <div class="metric-row"><span>Distance</span><span>${distKm.toFixed(1)} km</span></div>
          <div class="metric-row"><span>Straight</span><span>${straightKm.toFixed(1)} km</span></div>
          <div class="metric-row"><span>Cost (traffic)</span><span>${res.cost?.toFixed(1)||'N/A'}</span></div>
          <div class="metric-row"><span>Nodes explored</span><span>${res.visited.length}</span></div>
          <div class="metric-row"><span>Time</span><span>${elapsed.toFixed(1)} ms</span></div>
          <div class="metric-row"><span>🚧 Obstacles</span><span>${blockedNodes.size}</span></div>
          <div class="metric-row"><span>🚦 Traffic zones</span><span>${trafficZones.size}</span></div>
        </div>`;
      setInst(`✅ ${distKm.toFixed(1)} km | ${trafficZones.size} traffic zones`);
    }
    
    function compareAll() {
      if(points.length<2) return;
      const s=nearestNode(points[0]), g=nearestNode(points[1]);
      if(!s||!g) return;
      clearPathLayers();
      const results={};
      const keys=Object.keys(algos);
      for(let key of keys) {
        const t0=performance.now();
        const r=algos[key](s,g);
        const time=performance.now()-t0;
        results[key]={...r, time, distance: r.path.length?calcPathDistKm(r.path):0, cost:r.cost};
      }
      for(let key of keys) {
        const r=results[key];
        if(r.path.length) {
          const exp = L.polyline(r.visited.map(n=>[n.lat,n.lng]), {color:getAlgoColor(key), weight:1, opacity:0.25}).addTo(map);
          const pl = L.polyline(r.path, {color:getAlgoColor(key), weight:3, opacity:0.85, dashArray: key==='dijkstra'?null:'6 4'}).addTo(map);
          currentExplored.push(exp); currentPaths.push(pl);
        }
      }
      if(!showExplored) currentExplored.forEach(l=>map.removeLayer(l));
      const html = generateRankingsHTML(results, keys);
      document.getElementById('metricsContent').innerHTML = html;
      setInst(`COMPARE | ${trafficZones.size} traffic zones`);
    }
    
    function generateRankingsHTML(res, keys) {
      const valid=keys.filter(k=>res[k].path.length);
      if(!valid.length) return '<div>No paths found</div>';
      const byCost = [...valid].sort((a,b)=>res[a].cost-res[b].cost);
      const byTime = [...valid].sort((a,b)=>res[a].time-res[b].time);
      const byNodes = [...valid].sort((a,b)=>res[a].visited.length-res[b].visited.length);
      return `<div class="rankings-grid">
        <div class="ranking-category"><div>⚡ FASTEST</div><ul class="ranking-list">${byTime.slice(0,3).map((k,i)=>`<li class="${i===0?'rank-1':i===1?'rank-2':'rank-3'}"><span>${i+1}. ${ALGO_LABEL(k)}</span><span>${res[k].time.toFixed(1)}ms</span></li>`).join('')}</ul></div>
        <div class="ranking-category"><div>💰 LOWEST COST</div><ul>${byCost.slice(0,3).map((k,i)=>`<li><span>${ALGO_LABEL(k)}</span><span>${res[k].cost.toFixed(2)}</span></li>`).join('')}</ul></div>
        <div class="ranking-category"><div>🧠 NODES EXPANDED</div><ul>${byNodes.slice(0,3).map((k,i)=>`<li><span>${ALGO_LABEL(k)}</span><span>${res[k].visited.length}</span></li>`).join('')}</ul></div>
      </div><table class="compare-table"><tr><th>Algo</th><th>Dist(km)</th><th>Cost</th><th>Nodes</th></tr>${valid.map(k=>`<tr><td style="color:${getAlgoColor(k)}">${ALGO_LABEL(k)}</td><td>${res[k].distance.toFixed(1)}</td><td>${res[k].cost?.toFixed(1)}</td><td>${res[k].visited.length}</td></tr>`).join('')}</table>`;
    }
    
    function ALGO_LABEL(k) { return {dijkstra:'Dijkstra',astar:'A*',ara:'ARA*',theta:'Theta*',dstar:'D* Lite',fieldd:'Field D*',adstar:'AD*'}[k]; }
    function getAlgoColor(k) { return {dijkstra:'#facc15',astar:'#2dd4bf',ara:'#a78bfa',theta:'#34d399',dstar:'#fb923c',fieldd:'#f472b6',adstar:'#60a5fa'}[k]; }
    
    function updateStatsPanel(sNode, endNode) {
      if(!sNode) return;
      const straight = points.length===2?distGeo(points[0],points[1])/1000:0;
      document.getElementById('metricsContent').innerHTML = `<div class="metric-card"><div>✅ Network loaded</div><div class="metric-row"><span>Nodes</span><span>${graph.size}</span></div><div class="metric-row"><span>Straight dist</span><span>${straight.toFixed(1)}km</span></div><div class="metric-row"><span>Traffic zones</span><span>${trafficZones.size}</span></div></div>`;
    }
    function updateMetricsTrafficCount() { /* lazy refresh on traffic */ }
    
    // map interactions
    map.on('click', async (e) => {
      if(points.length>=2) {
        const node = nearestNode(e.latlng);
        if(node && !blockedNodes.has(node)) addTrafficZone(node);
        return;
      }
      points.push(e.latlng);
      const col = points.length===1 ? '#2dd4bf' : '#f43f5e';
      const mrk = L.circleMarker(e.latlng, {radius:9, color:col, fillColor:col, fillOpacity:1, weight:2}).addTo(map);
      startMarkers.push(mrk);
      if(points.length===1) setInst('✅ START set → click to set END');
      else { setInst('Loading roads...'); await loadNetwork(); }
    });
    
    map.on('contextmenu', (e) => {
      const node = nearestNode(e.latlng);
      if(node && !blockedNodes.has(node)) {
        blockedNodes.add(node);
        const circle = L.circle([node.lat, node.lng], {radius:22, color:'#ef4444', fillColor:'#ef4444', fillOpacity:0.7, weight:2}).addTo(map);
        obstacleLayers.push(circle);
        setInst(`Obstacle added (${blockedNodes.size})`);
      } else setInst('Already blocked or no road');
    });
    
    // UI events
    document.getElementById('runSingleBtn').onclick = runSingle;
    document.getElementById('compareAllBtn').onclick = compareAll;
    document.getElementById('resetBtn').onclick = () => {
      points=[]; startMarkers.forEach(m=>map.removeLayer(m)); startMarkers=[];
      graph.clear(); blockedNodes.clear(); obstacleLayers.forEach(l=>map.removeLayer(l)); obstacleLayers=[];
      clearPathLayers(); clearTrafficAll(); trafficZones.clear(); setStatus('IDLE'); setInst('LEFT CLICK → SET START');
      document.getElementById('metricsContent').innerHTML = '<div style="padding:8px;">Reset. Click map to set start/end.</div>';
    };
    document.getElementById('clearTrafficBtn').onclick = clearTrafficAll;
    document.getElementById('showExploredCb').onchange = (e) => { showExplored = e.target.checked; currentExplored.forEach(l=> showExplored?map.addLayer(l):map.removeLayer(l)); };
    document.getElementById('showTrafficCheck').onchange = (e) => { const visible=e.target.checked; trafficZones.forEach(z=> visible?map.addLayer(z.circleLayer):map.removeLayer(z.circleLayer)); };
    document.querySelectorAll('.traffic-btn[data-traffic]').forEach(btn => {
      btn.onclick = () => { currentTrafficLevel = btn.getAttribute('data-traffic'); setInst(`Traffic mode: ${currentTrafficLevel.toUpperCase()} → click road`); };
    });
    document.getElementById('togglePathsBtn').onclick = () => { currentPaths.forEach(l=> map.hasLayer(l)?map.removeLayer(l):map.addLayer(l)); };
    document.getElementById('toggleExploredBtn').onclick = () => { showExplored=!showExplored; document.getElementById('showExploredCb').checked=showExplored; currentExplored.forEach(l=> showExplored?map.addLayer(l):map.removeLayer(l)); };
    document.getElementById('clearPathsLegend').onclick = () => clearPathLayers();
    
    // Theme
    let dark=true;
    document.getElementById('theme-toggle').onclick = () => {
      dark=!dark;
      document.body.classList.toggle('light-mode', !dark);
      document.getElementById('theme-toggle').innerHTML = dark ? '🌙 Dark' : '☀️ Light';
      setTimeout(()=>map.invalidateSize(),50);
    };
    document.body.classList.add('dark-mode');
  })();
</script>
