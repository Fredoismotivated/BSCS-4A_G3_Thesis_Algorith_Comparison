<!DOCTYPE html>
<html>
<head>
    <title>Advanced Pathfinding Algorithm Comparator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="controls">
        <h2>Algorithm Comparator</h2>
    
        <label>Grid Size</label>
        <input type="number" id="gridSize" value="20" min="5" max="30">
    
        <button onclick="generateGrid()">Generate Grid</button>
        <button onclick="addRandomObstacles()">Random Obstacles</button>
    
        <label>Select Algorithm</label>
        <select id="algorithmSelect">
            <option value="aStar">A*</option>
            <option value="dijkstra">Dijkstra</option>
            <option value="thetaStar">Theta*</option>
            <option value="araStar">ARA*</option>
            <option value="adStar">AD*</option>
            <option value="dStarLite">D* Lite</option>
            <option value="fieldDStar">Field D*</option>
        </select>
    
        <button onclick="spawnMovingObstacles()">Spawn Moving Obstacles</button>
        <button onclick="addTrafficZones()">Add Traffic</button>

        <button onclick="runAlgorithm()">Run Algorithm</button>
        <button onclick="batchTest()">Batch Testing (Animated)</button>
        <button onclick="clearGrid()">Clear Grid</button>
    
        <h3>Performance Dashboard</h3>
        <div id="dashboard">
            Nodes Expanded: <span id="nodes">0</span><br>
            Path Cost: <span id="cost">0</span><br>
            Time (ms): <span id="time">0</span>
        </div>
    
        <h3>Batch Results</h3>
        <div id="batchResults">No batch tests run yet.</div>
    
        <!-- Algorithm Color Legend -->
        <h3>Algorithm Colors</h3>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color color-astar"></div> A*
            </div>
            <div class="legend-item">
                <div class="legend-color color-dijkstra"></div> Dijkstra
            </div>
            <div class="legend-item">
                <div class="legend-color color-theta"></div> Theta*
            </div>
            <div class="legend-item">
                <div class="legend-color color-ara"></div> ARA*
            </div>
            <div class="legend-item">
                <div class="legend-color color-ad"></div> AD*
            </div>
            <div class="legend-item">
                <div class="legend-color color-dlite"></div> D* Lite
            </div>
            <div class="legend-item">
                <div class="legend-color color-field"></div> Field D*
            </div>
        </div>
    </div>
    
    <div id="grid-container">
        <canvas id="pathCanvas"></canvas>
        <div id="grid"></div>
    </div>

<script>
let dynamicObstacles = [];
let dynamicInterval = null;
// para sa dynamic environment


let gridSize = 20;
let gridData = [];
let cellElements = [];
let start = { x: 0, y: 0 };
let end = { x: gridSize - 1, y: gridSize - 1 };

// ------------------ Grid Generation ------------------
function generateGrid() {
    gridSize = parseInt(document.getElementById("gridSize").value) || 20;
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
    grid.style.setProperty('--grid-size', gridSize);

    start = { x: 0, y: 0 };
    end = { x: gridSize - 1, y: gridSize - 1 };

    gridData = [];
    cellElements = [];

    for (let y = 0; y < gridSize; y++) {
        gridData[y] = [];
        cellElements[y] = [];
        for (let x = 0; x < gridSize; x++) {
            const cell = document.createElement("div");
            cell.classList.add("cell");
            if (x === start.x && y === start.y) cell.classList.add("start");
            if (x === end.x && y === end.y) cell.classList.add("end");

            cell.onclick = (e) => {
                if (e.shiftKey) setWeightedCell(cell, x, y);
                else toggleObstacle(cell, x, y);
            };

            grid.appendChild(cell);
            gridData[y][x] = 0;
            cellElements[y][x] = cell;
        }
    }
    
    // Resize canvas after grid is generated
    setTimeout(() => {
        resizeCanvas();
    }, 10);
}

// ------------------ Window Resize Handler ------------------
window.addEventListener('resize', () => {
    resizeCanvas();
});

// Call resizeCanvas after any grid modification
const originalAddRandomObstacles = addRandomObstacles;
addRandomObstacles = function(percentage) {
    originalAddRandomObstacles(percentage);
    setTimeout(resizeCanvas, 10);
};

const originalAddTrafficZones = addTrafficZones;
addTrafficZones = function(count) {
    originalAddTrafficZones(count);
    setTimeout(resizeCanvas, 10);
};

// ------------------ Cell Updates ------------------
function toggleObstacle(cell, x, y) {
    if ((x === start.x && y === start.y) || (x === end.x && y === end.y)) return;

    if (gridData[y][x] === 1) {
        gridData[y][x] = 0;
        cell.classList.remove("obstacle");
        cell.classList.remove("traffic");  // Also remove traffic class
        delete cell.dataset.weight;
        cell.innerText = "";
        cell.style.fontSize = "";  // Reset font size
    } else {
        gridData[y][x] = 1;
        cell.classList.remove("weighted");
        cell.classList.remove("traffic");
        cell.classList.add("obstacle");
        delete cell.dataset.weight;
        cell.innerText = "";
        cell.style.fontSize = "";
    }
}

function setWeightedCell(cell, x, y) {
    if ((x === start.x && y === start.y) || (x === end.x && y === end.y)) return;

    const weight = parseInt(document.getElementById("terrainWeight").value);
    gridData[y][x] = weight;
    cell.classList.remove("obstacle");
    cell.classList.remove("traffic");
    cell.classList.add("weighted");
    cell.dataset.weight = weight;
    
    // Make weighted cells uniform by using a small indicator
    cell.innerText = "•";  // Use a dot instead of number
    cell.style.fontSize = "1.5rem";
    cell.style.lineHeight = "1";
}


// ------------------ Random Obstacles ------------------
function addRandomObstacles(percentage = 20) {
    for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
            if (gridData[y][x] === 1 || gridData[y][x] > 1) {
                gridData[y][x] = 0;
                cellElements[y][x].classList.remove("obstacle", "weighted", "traffic");
                delete cellElements[y][x].dataset.weight;
                cellElements[y][x].innerText = "";
                cellElements[y][x].style.fontSize = "";
            }
        }
    }

    const totalCells = gridSize * gridSize;
    const obstaclesCount = Math.floor((percentage / 100) * totalCells);
    let placed = 0;

    while (placed < obstaclesCount) {
        const x = Math.floor(Math.random() * gridSize);
        const y = Math.floor(Math.random() * gridSize);
        if ((x === start.x && y === start.y) || (x === end.x && y === end.y)) continue;
        if (gridData[y][x] === 0) {
            gridData[y][x] = 1;
            cellElements[y][x].classList.add("obstacle");
            cellElements[y][x].innerText = "";
            cellElements[y][x].style.fontSize = "";
            placed++;
        }
    }
}

// ------------------MOVING OBSTACLES ------------------
function spawnMovingObstacles(count = 5){
    dynamicObstacles = [];

    for(let i=0;i<count;i++){
        let x = Math.floor(Math.random()*gridSize);
        let y = Math.floor(Math.random()*gridSize);

        if(gridData[y][x] === 0){
            dynamicObstacles.push({x,y,dx:1,dy:0});
            cellElements[y][x].classList.add("moving");
        }
    }

    startDynamicMovement();
}

// ------------------MOVING OBSTACLES FUNCTION------------------
function startDynamicMovement(){
    if(dynamicInterval) clearInterval(dynamicInterval);

    dynamicInterval = setInterval(()=>{
        dynamicObstacles.forEach(obj=>{
            // remove old
            cellElements[obj.y][obj.x].classList.remove("moving");

            let nx = obj.x + obj.dx;
            let ny = obj.y + obj.dy;

            // bounce on walls
            if(nx < 0 || nx >= gridSize || gridData[obj.y][nx] === 1){
                obj.dx *= -1;
                nx = obj.x + obj.dx;
            }

            if(ny < 0 || ny >= gridSize || gridData[ny]?.[obj.x] === 1){
                obj.dy *= -1;
                ny = obj.y + obj.dy;
            }

            obj.x = nx;
            obj.y = ny;

            // apply new
            cellElements[obj.y][obj.x].classList.add("moving");
        });
    }, 300);
}

// ------------------ SLOW TERRAIN (TRAFFIC) ------------------
function addTrafficZones(count = 10) {
    for(let i = 0; i < count; i++) {
        let x = Math.floor(Math.random() * gridSize);
        let y = Math.floor(Math.random() * gridSize);

        if(gridData[y][x] === 0 && 
           !(x === start.x && y === start.y) && 
           !(x === end.x && y === end.y)) {
            let weight = Math.floor(Math.random() * 5) + 3; // 3–7
            gridData[y][x] = weight;

            const cell = cellElements[y][x];
            cell.classList.remove("obstacle", "weighted");
            cell.classList.add("traffic");
            cell.dataset.weight = weight;
            
            // Use a small indicator instead of full number
            cell.innerText = "▲";  // Triangle indicator for traffic
            cell.style.fontSize = "1.2rem";
            cell.style.lineHeight = "1";
        }
    }
}

// ------------------ Pathfinding Helpers ------------------
function isMovingObstacle(x,y){
    return dynamicObstacles.some(o => o.x === x && o.y === y);
}

function neighbors(x, y) {
    const dirs = [[1,0], [-1,0], [0,1], [0,-1]];
    return dirs.map(([dx, dy]) => ({ x: x+dx, y: y+dy }))
        .filter(n =>
            n.x >= 0 && n.y >= 0 &&
            n.x < gridSize && n.y < gridSize &&
            gridData[n.y][n.x] !== 1 &&
            !isMovingObstacle(n.x, n.y) // 🔥 NEW
        );
}

function getCellCost(x, y) {
    if (gridData[y][x] === 1) return Infinity;

    // moving obstacle = temporary block
    if (isMovingObstacle(x,y)) return Infinity;

    if (cellElements[y][x].classList.contains("traffic"))
        return parseInt(cellElements[y][x].dataset.weight) || 5;

    if (cellElements[y][x].classList.contains("weighted"))
        return parseInt(cellElements[y][x].dataset.weight) || 1;

    return 1;
}

function heuristic(a, b) {
    return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
}

function reconstruct(cameFrom, current) {
    const path = [];
    while (current) {
        path.push(current);
        current = cameFrom[current.y]?.[current.x];
    }
    return path.reverse();
}

// ------------------ Canvas Animation ------------------
function resizeCanvas() {
    const canvas = document.getElementById("pathCanvas");
    const grid = document.getElementById("grid");
    const gridContainer = document.getElementById("grid-container");
    
    // Get the grid's position relative to the container
    const gridRect = grid.getBoundingClientRect();
    const containerRect = gridContainer.getBoundingClientRect();
    
    // Calculate the offset from the container's padding
    const style = window.getComputedStyle(gridContainer);
    const paddingLeft = parseInt(style.paddingLeft) || 10;
    const paddingTop = parseInt(style.paddingTop) || 10;
    
    // Set canvas dimensions to match grid exactly
    canvas.width = grid.offsetWidth;
    canvas.height = grid.offsetHeight;
    
    // Position canvas exactly over the grid
    canvas.style.position = 'absolute';
    canvas.style.top = paddingTop + 'px';
    canvas.style.left = paddingLeft + 'px';
    canvas.style.width = grid.offsetWidth + 'px';
    canvas.style.height = grid.offsetHeight + 'px';
}
async function animatePath(visited, path, pathColor='yellow', visitedColor='rgba(135,206,250,0.3)') {
    const canvas = document.getElementById("pathCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const grid = document.getElementById("grid");
    const style = getComputedStyle(grid);
    const gap = parseInt(style.gap) || 0;
    
    // Calculate cell dimensions based on canvas size (which now matches grid exactly)
    const cellWidth = (canvas.width - (gridSize - 1) * gap) / gridSize;
    const cellHeight = (canvas.height - (gridSize - 1) * gap) / gridSize;

    // Draw visited nodes
    for (let node of visited) {
        if (!(node.x === start.x && node.y === start.y) && !(node.x === end.x && node.y === end.y)) {
            ctx.fillStyle = visitedColor;
            
            // Calculate exact position including gap
            const x = node.x * (cellWidth + gap);
            const y = node.y * (cellHeight + gap);
            
            ctx.fillRect(x, y, cellWidth, cellHeight);
            await new Promise(r => setTimeout(r, 1));
        }
    }

    // Draw path
    ctx.strokeStyle = pathColor;
    ctx.lineWidth = Math.min(cellWidth, cellHeight) / 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    
    for (let i = 0; i < path.length; i++) {
        const node = path[i];
        
        // Calculate center position including gap
        const x = node.x * (cellWidth + gap) + cellWidth / 2;
        const y = node.y * (cellHeight + gap) + cellHeight / 2;
        
        if (i === 0) {
            ctx.moveTo(x, y);
        } else {
            ctx.lineTo(x, y);
        }
        
        // Draw incrementally for animation
        if (i < path.length - 1) {
            ctx.stroke();
            await new Promise(r => setTimeout(r, 20));
            ctx.beginPath();
            ctx.moveTo(x, y);
        }
    }
    ctx.stroke();
}
// ------------------ A* ------------------
async function aStar() {
    const open=[start];
    const cameFrom=Array(gridSize).fill().map(()=>Array(gridSize).fill(null));
    const g=Array(gridSize).fill().map(()=>Array(gridSize).fill(Infinity));
    g[start.y][start.x]=0;
    const visited=[];

    while(open.length){
        open.sort((a,b)=>(g[a.y][a.x]+heuristic(a,end))-(g[b.y][b.x]+heuristic(b,end)));
        const current = open.shift();
        visited.push(current);

        if(current.x===end.x && current.y===end.y){
            const path=reconstruct(cameFrom,current);
            await animatePath(visited,path,'yellow','rgba(255,255,0,0.2)');
            return {visitedCount:visited.length, pathCost:g[end.y][end.x], path};
        }

        for(let n of neighbors(current.x,current.y)){
            const tentative = g[current.y][current.x]+getCellCost(n.x,n.y);
            if(tentative<g[n.y][n.x]){
                g[n.y][n.x]=tentative;
                cameFrom[n.y][n.x]=current;
                if(!open.some(o=>o.x===n.x && o.y===n.y)) open.push(n);
            }
        }
    }
}

// ------------------ Dijkstra ------------------
async function dijkstra() {
    const queue=[start];
    const cameFrom=Array(gridSize).fill().map(()=>Array(gridSize).fill(null));
    const dist=Array(gridSize).fill().map(()=>Array(gridSize).fill(Infinity));
    dist[start.y][start.x]=0;
    const visited=[];

    while(queue.length){
        queue.sort((a,b)=>dist[a.y][a.x]-dist[b.y][b.x]);
        const current=queue.shift();
        visited.push(current);

        if(current.x===end.x && current.y===end.y){
            const path=reconstruct(cameFrom,current);
            await animatePath(visited,path,'violet','rgba(238,130,238,0.2)');
            return {visitedCount:visited.length, pathCost:dist[end.y][end.x], path};
        }

        for(let n of neighbors(current.x,current.y)){
            const alt=dist[current.y][current.x]+getCellCost(n.x,n.y);
            if(alt<dist[n.y][n.x]){
                dist[n.y][n.x]=alt;
                cameFrom[n.y][n.x]=current;
                if(!queue.some(o=>o.x===n.x && o.y===n.y)) queue.push(n);
            }
        }
    }
}

// ------------------ Theta* (Any-Angle A*) ------------------
function lineOfSight(a, b) {
    let x0 = a.x, y0 = a.y;
    let x1 = b.x, y1 = b.y;

    let dx = Math.abs(x1 - x0);
    let dy = Math.abs(y1 - y0);
    let sx = (x0 < x1) ? 1 : -1;
    let sy = (y0 < y1) ? 1 : -1;
    let err = dx - dy;

    while (true) {
        if (gridData[y0][x0] === 1) return false;  // Check for obstacles
        if (x0 === x1 && y0 === y1) break;
        let e2 = 2 * err;
        if (e2 > -dy) { err -= dy; x0 += sx; }
        if (e2 < dx) { err += dx; y0 += sy; }
    }
    return true;
}

// ------------------ Theta* (Fixed) ------------------
async function thetaStar() {
    const open = [start];
    const cameFrom = Array(gridSize).fill().map(() => Array(gridSize).fill(null));
    const g = Array(gridSize).fill().map(() => Array(gridSize).fill(Infinity));
    g[start.y][start.x] = 0;
    cameFrom[start.y][start.x] = start;
    const visited = [];

    while (open.length) {
        open.sort((a, b) => (g[a.y][a.x] + heuristic(a, end)) - (g[b.y][b.x] + heuristic(b, end)));
        const current = open.shift();
        visited.push(current);

        if (current.x === end.x && current.y === end.y) {
            const path = reconstructTheta(cameFrom, current);
            await animatePath(visited, path, 'cyan', 'rgba(0,255,255,0.2)');
            return { visitedCount: visited.length, pathCost: g[end.y][end.x], path };
        }

        for (let n of neighbors(current.x, current.y)) {
            // Check line of sight from current's parent to neighbor
            if (cameFrom[current.y][current.x] && 
                lineOfSight(cameFrom[current.y][current.x], n)) {
                
                const parent = cameFrom[current.y][current.x];
                const tentative = g[parent.y][parent.x] + distance(parent, n);
                
                if (tentative < g[n.y][n.x]) {
                    g[n.y][n.x] = tentative;
                    cameFrom[n.y][n.x] = parent;
                    if (!open.some(o => o.x === n.x && o.y === n.y)) open.push(n);
                }
            } else {
                const tentative = g[current.y][current.x] + getCellCost(n.x, n.y);
                
                if (tentative < g[n.y][n.x]) {
                    g[n.y][n.x] = tentative;
                    cameFrom[n.y][n.x] = current;
                    if (!open.some(o => o.x === n.x && o.y === n.y)) open.push(n);
                }
            }
        }
    }
}

function reconstructTheta(cameFrom, current) {
    const path = [];
    while (current) {
        path.push(current);
        current = cameFrom[current.y]?.[current.x];
        // Avoid infinite loop if parent points to itself
        if (current && path.length > 1 && path[path.length-1].x === current.x && path[path.length-1].y === current.y) break;
    }
    return path.reverse();
}

function distance(a, b) {
    return Math.sqrt(Math.pow(a.x - b.x, 2) + Math.pow(a.y - b.y, 2));
}

// ------------------ ARA* (Fixed - No Duplicate Runs) ------------------
async function araStar() {
    let epsilon = 2.5;
    const open = [];
    const closed = new Set();
    const cameFrom = Array(gridSize).fill().map(() => Array(gridSize).fill(null));
    const g = Array(gridSize).fill().map(() => Array(gridSize).fill(Infinity));
    const allVisited = []; // Track ALL visited nodes across iterations
    let bestPath = null;
    let bestCost = Infinity;
    
    g[start.y][start.x] = 0;

    while (epsilon >= 1) {
        // Reset for new epsilon iteration
        open.length = 0;
        closed.clear();
        
        // Re-initialize g values for start
        g[start.y][start.x] = 0;
        
        // Clear cameFrom for this iteration (but keep for path reconstruction)
        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                cameFrom[y][x] = null;
            }
        }
        
        open.push({ ...start, key: g[start.y][start.x] + epsilon * heuristic(start, end) });
        
        const iterationVisited = []; // Track visited nodes for THIS iteration only
        
        while (open.length) {
            open.sort((a, b) => a.key - b.key);
            const current = open.shift();
            
            if (closed.has(`${current.x},${current.y}`)) continue;
            
            iterationVisited.push(current);
            allVisited.push(current); // Add to overall visited
            closed.add(`${current.x},${current.y}`);

            if (current.x === end.x && current.y === end.y) {
                const path = reconstruct(cameFrom, current);
                const cost = g[end.y][end.x];
                
                if (cost < bestCost) {
                    bestCost = cost;
                    bestPath = path;
                }
                
                // Show intermediate result if epsilon > 1
                if (epsilon > 1) {
                    await animatePath(iterationVisited, path, 'lime', 'rgba(0,255,0,0.1)');
                    await new Promise(r => setTimeout(r, 500));
                }
                break;
            }

            for (let n of neighbors(current.x, current.y)) {
                if (closed.has(`${n.x},${n.y}`)) continue;
                
                const tentative = g[current.y][current.x] + getCellCost(n.x, n.y);
                
                if (tentative < g[n.y][n.x]) {
                    g[n.y][n.x] = tentative;
                    cameFrom[n.y][n.x] = current;
                    
                    const key = g[n.y][n.x] + epsilon * heuristic(n, end);
                    if (!open.some(o => o.x === n.x && o.y === n.y)) {
                        open.push({ ...n, key });
                    }
                }
            }
        }
        
        epsilon -= 0.5;
    }
    
    // Final result with best path - use allVisited for the final animation
    const finalPath = bestPath || reconstruct(cameFrom, end);
    await animatePath(allVisited, finalPath, 'lime', 'rgba(0,255,0,0.2)');
    return { visitedCount: allVisited.length, pathCost: bestCost, path: finalPath };
}
// ------------------ Simplified AD* (Anytime A* with decreasing epsilon) ------------------
async function adStar() {
    let epsilon = 2.5;
    const allVisited = [];
    let bestPath = null;
    let bestCost = Infinity;
    
    while (epsilon >= 1) {
        const open = [start];
        const cameFrom = Array(gridSize).fill().map(() => Array(gridSize).fill(null));
        const g = Array(gridSize).fill().map(() => Array(gridSize).fill(Infinity));
        g[start.y][start.x] = 0;
        const visited = [];
        
        while (open.length) {
            // Sort using inflated heuristic
            open.sort((a, b) => 
                (g[a.y][a.x] + epsilon * heuristic(a, end)) - 
                (g[b.y][b.x] + epsilon * heuristic(b, end))
            );
            
            const current = open.shift();
            visited.push(current);
            allVisited.push(current);
            
            if (current.x === end.x && current.y === end.y) {
                const path = reconstruct(cameFrom, current);
                const cost = g[end.y][end.x];
                
                if (cost < bestCost) {
                    bestCost = cost;
                    bestPath = path;
                }
                
                // Show intermediate result
                if (epsilon > 1) {
                    await animatePath(visited, path, 'orange', 'rgba(255,165,0,0.1)');
                    await new Promise(r => setTimeout(r, 500));
                }
                break;
            }
            
            for (let n of neighbors(current.x, current.y)) {
                const tentative = g[current.y][current.x] + getCellCost(n.x, n.y);
                if (tentative < g[n.y][n.x]) {
                    g[n.y][n.x] = tentative;
                    cameFrom[n.y][n.x] = current;
                    if (!open.some(o => o.x === n.x && o.y === n.y)) {
                        open.push(n);
                    }
                }
            }
        }
        
        epsilon -= 0.5;
    }
    
    // Final result with best path
    const finalPath = bestPath || reconstruct(cameFrom, end);
    await animatePath(allVisited, finalPath, 'orange', 'rgba(255,165,0,0.2)');
    return { 
        visitedCount: allVisited.length, 
        pathCost: bestCost, 
        path: finalPath 
    };
}
// ------------------ Field D* (Fixed with proper interpolation) ------------------
async function fieldDStar() {
    const open = [start];
    const cameFrom = Array(gridSize).fill().map(() => Array(gridSize).fill(null));
    const g = Array(gridSize).fill().map(() => Array(gridSize).fill(Infinity));
    g[start.y][start.x] = 0;
    const visited = [];

    function interpolatedCost(node, neighbor) {
        // Get the 4 neighbors for bilinear interpolation
        const x = node.x;
        const y = node.y;
        const nx = neighbor.x;
        const ny = neighbor.y;
        
        // Simple linear interpolation along the edge
        const dx = nx - x;
        const dy = ny - y;
        
        if (dx !== 0 && dy !== 0) {
            // Diagonal movement - interpolate between horizontal and vertical
            const costH = (getCellCost(x + dx, y) + getCellCost(x, y)) / 2;
            const costV = (getCellCost(x, y + dy) + getCellCost(x, y)) / 2;
            return (costH + costV) / 2 * Math.sqrt(2);
        } else {
            // Straight movement
            return getCellCost(nx, ny);
        }
    }

    while (open.length) {
        open.sort((a, b) => (g[a.y][a.x] + heuristic(a, end)) - (g[b.y][b.x] + heuristic(b, end)));
        const current = open.shift();
        visited.push(current);

        if (current.x === end.x && current.y === end.y) {
            const path = reconstruct(cameFrom, current);
            await animatePath(visited, path, '#87CEFA', 'rgba(135,206,250,0.2)');
            return { visitedCount: visited.length, pathCost: g[end.y][end.x], path };
        }

        // Check all 8 neighbors (including diagonals)
        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
                if (dx === 0 && dy === 0) continue;
                
                const nx = current.x + dx;
                const ny = current.y + dy;
                
                if (nx < 0 || nx >= gridSize || ny < 0 || ny >= gridSize) continue;
                if (gridData[ny][nx] === 1) continue; // Obstacle
                
                const moveCost = interpolatedCost(current, {x: nx, y: ny});
                const tentative = g[current.y][current.x] + moveCost;
                
                if (tentative < g[ny][nx]) {
                    g[ny][nx] = tentative;
                    cameFrom[ny][nx] = current;
                    if (!open.some(o => o.x === nx && o.y === ny)) open.push({x: nx, y: ny});
                }
            }
        }
    }
}

// ------------------D* Lite (Simplified Educational Version)------------------
async function dStarLite() {
    const open=[end];
    const cameFrom=Array(gridSize).fill().map(()=>Array(gridSize).fill(null));
    const g=Array(gridSize).fill().map(()=>Array(gridSize).fill(Infinity));
    g[end.y][end.x]=0;
    const visited=[];

    while(open.length){
        open.sort((a,b)=>g[a.y][a.x]-g[b.y][b.x]);
        const current=open.shift();
        visited.push(current);

        if(current.x===start.x && current.y===start.y){
            const path=reconstruct(cameFrom,current).reverse();
            await animatePath(visited,path,'red','rgba(255,0,0,0.2)');
            return {visitedCount:visited.length,pathCost:g[start.y][start.x],path};
        }

        for(let n of neighbors(current.x,current.y)){
            const tentative=g[current.y][current.x]+getCellCost(n.x,n.y);
            if(tentative<g[n.y][n.x]){
                g[n.y][n.x]=tentative;
                cameFrom[n.y][n.x]=current;
                if(!open.some(o=>o.x===n.x && o.y===n.y)) open.push(n);
            }
        }
    }
}

// ------------------ Batch Test ------------------
async function batchTest(){
    resizeCanvas();
    const resultsDiv = document.getElementById("batchResults");
    resultsDiv.innerText = "Running Animated Batch Test...";

    const algorithms = ['aStar', 'dijkstra', 'thetaStar', 'araStar', 'adStar', 'dStarLite', 'fieldDStar'];
    const results = [];

    for (let algo of algorithms) {
        const startTime = performance.now();
        const result = await window[algo]();
        const endTime = performance.now();

        results.push({
            name: algo,
            nodes: result.visitedCount,
            cost: result.pathCost,
            time: parseFloat((endTime - startTime).toFixed(2))
        });

        await new Promise(r => setTimeout(r, 300));
    }

    // ---------- SORTING ----------
    const fastest = [...results].sort((a,b)=>a.time-b.time);
    const cheapest = [...results].sort((a,b)=>a.cost-b.cost);
    const leastNodes = [...results].sort((a,b)=>a.nodes-b.nodes);

    // ---------- RANK ASSIGNMENT ----------
    function assignRank(arr, key){
        arr.forEach((item, index)=>{
            item[`${key}Rank`] = index + 1;
        });
    }

    assignRank(fastest, "time");
    assignRank(cheapest, "cost");
    assignRank(leastNodes, "nodes");

    // Merge ranks back
    const merged = results.map(r=>{
        return {
            ...r,
            timeRank: fastest.find(x=>x.name===r.name).timeRank,
            costRank: cheapest.find(x=>x.name===r.name).costRank,
            nodesRank: leastNodes.find(x=>x.name===r.name).nodesRank
        };
    });

    // ---------- OVERALL SCORE ----------
    merged.forEach(r=>{
        r.totalScore = r.timeRank + r.costRank + r.nodesRank;
    });

    const overall = [...merged].sort((a,b)=>a.totalScore-b.totalScore);

    // ---------- DISPLAY ----------
    let output = `<strong>🏆 Rankings</strong><br><br>`;

    output += `<strong>⚡ Fastest:</strong><br>`;
    fastest.slice(0,3).forEach((r,i)=>{
        output += `${i+1}. ${formatName(r.name)} (${r.time} ms)<br>`;
    });

    output += `<br><strong>💰 Lowest Cost:</strong><br>`;
    cheapest.slice(0,3).forEach((r,i)=>{
        output += `${i+1}. ${formatName(r.name)} (${r.cost.toFixed(2)})<br>`;
    });

    output += `<br><strong>🧠 Least Nodes Expanded:</strong><br>`;
    leastNodes.slice(0,3).forEach((r,i)=>{
        output += `${i+1}. ${formatName(r.name)} (${r.nodes})<br>`;
    });

    output += `<br><strong>🏅 Overall Best:</strong><br>`;
    overall.slice(0,3).forEach((r,i)=>{
        output += `${i+1}. ${formatName(r.name)} (Score: ${r.totalScore})<br>`;
    });

    output += `<hr><strong>📊 Full Results</strong><br><br>`;

    output += `
    <table style="width:100%; font-size:12px; border-collapse:collapse;">
        <tr>
            <th>Algo</th>
            <th>Time</th>
            <th>Cost</th>
            <th>Nodes</th>
            <th>Score</th>
        </tr>
    `;

    merged.forEach(r=>{
        output += `
        <tr>
            <td>${formatName(r.name)}</td>
            <td>${r.time}ms (#${r.timeRank})</td>
            <td>${r.cost.toFixed(2)} (#${r.costRank})</td>
            <td>${r.nodes} (#${r.nodesRank})</td>
            <td><strong>${r.totalScore}</strong></td>
        </tr>
        `;
    });

    output += `</table>`;

    resultsDiv.innerHTML = output;
}

// Helper
function formatName(name){
    return name.replace(/([A-Z])/g, ' $1').toUpperCase();
}

// ------------------ Clear Grid ------------------
function clearGrid() {
    // Stop dynamic movement if active
    if(dynamicInterval) {
        clearInterval(dynamicInterval);
        dynamicInterval = null;
    }
    dynamicObstacles = [];
    
    // Reset the grid data and elements
    gridData = [];
    cellElements = [];
    
    generateGrid();  // Re-generate the grid
    const canvas = document.getElementById("pathCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);  // Clear the canvas
    
    // Reset dashboard stats
    document.getElementById("nodes").innerText = 0;
    document.getElementById("cost").innerText = 0;
    document.getElementById("time").innerText = 0;
    document.getElementById("batchResults").innerText = "No batch tests run yet.";
}
